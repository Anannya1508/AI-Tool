<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insightalysis AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --light: #f3f4f6;
            --dark: #1f2937;
            --border: #e5e7eb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--dark);
            width: 500px;
            min-height: 600px;
        }
        .container { background: white; height: 100%; display: flex; flex-direction: column; }
        .header {
            background: linear-gradient(135deg, var(--primary), #ec4899);
            color: white;
            padding: 15px;
            text-align: center;
        }
        .header h1 { font-size: 16px; margin-bottom: 4px; }
        .header p { font-size: 11px; opacity: 0.9; }
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .section { margin-bottom: 15px; }
        .section h2 { font-size: 12px; margin-bottom: 10px; color: var(--dark); }
        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            background: var(--light);
            cursor: pointer;
        }
        .upload-area:hover { border-color: #ec4899; background: #fce7f3; }
        .btn-upload {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-upload:hover { background: #4f46e5; }
        .file-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: white;
            border-radius: 4px;
            margin-bottom: 6px;
            border-left: 3px solid var(--primary);
            font-size: 11px;
        }
        .btn-remove {
            background: var(--danger);
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .btn-analysis {
            background: var(--light);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }
        .btn-analysis.active {
            background: var(--primary);
            color: white;
        }
        .btn-analyze {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            width: 100%;
        }
        .result-card {
            background: var(--light);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary);
        }
        .result-card h3 { font-size: 11px; margin-bottom: 6px; }
        .content-box { background: white; padding: 8px; border-radius: 3px; font-size: 10px; max-height: 80px; overflow-y: auto; }
        ul { list-style: none; background: white; padding: 8px; border-radius: 3px; }
        li { padding: 4px 0; font-size: 10px; border-bottom: 1px solid var(--border); }
        li:last-child { border-bottom: none; }
        .status { padding: 10px; background: #e8f5e9; border-radius: 3px; font-size: 10px; color: #2e7d32; margin-bottom: 10px; text-align: center; display: none; }
        .status.active { display: block; }
        .status.error { background: #ffebee; color: #c62828; }
        .loading { text-align: center; padding: 20px; }
        .spinner {
            border: 2px solid var(--light);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { background: var(--light); padding: 8px; text-align: center; font-size: 9px; color: #9ca3af; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Insightalysis AI</h1>
            <p>Data & Research Analysis</p>
        </header>

        <div class="content">
            <div class="status" id="statusBox"></div>

            <div class="section">
                <button class="btn-upload" onclick="checkBackend()" style="background: #f59e0b; width: 100%;">
                    🔌 Check Backend
                </button>
            </div>

            <div class="section">
                <h2>📤 Upload Files</h2>
                <div class="upload-area" id="uploadArea">
                    <p style="font-size: 20px; margin: 0;">📁</p>
                    <p style="font-size: 10px; margin: 6px 0;">Drag CSV/PDF/PKL files here or click</p>
                    <input type="file" id="fileInput" multiple accept=".csv,.pdf,.pkl" style="display:none;">
                    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Select Files</button>
                </div>
                <div id="fileList" style="margin-top: 10px;"></div>
                <div style="margin-top: 8px;">
                    <input
                        type="text"
                        id="targetColumnInput"
                        placeholder="Optional target column (e.g. Marks)"
                        style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:4px; font-size:10px;"
                    >
                </div>
            </div>

            <div class="section" id="analysisSection" style="display:none;">
                <h2>🔍 Analysis Type</h2>
                <div class="button-group">
                    <button class="btn-analysis active" data-type="auto">🤖 Auto</button>
                    <button class="btn-analysis" data-type="csv">📊 CSV</button>
                    <button class="btn-analysis" data-type="pdf">📄 PDF</button>
                    <button class="btn-analysis" data-type="combined">🔗 Both</button>
                </div>
                <button class="btn-analyze" id="analyzeBtn">Start Analysis</button>
            </div>

            <div id="resultsContainer"></div>
        </div>

            <footer class="footer">Insightalysis AI v1.0</footer>
    </div>

    <script src="js/popup.js"></script>
</body>
</html>
